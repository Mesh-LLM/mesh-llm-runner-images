name: MeshLLM Public Runner Container

on:
  workflow_dispatch:
  pull_request:

jobs:
  linux-check:
    runs-on: ubuntu-24.04
    container:
      image: ghcr.io/mesh-llm/mesh-llm-cuda-runner:public-latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v7
      - name: Prove environment and build
        run: |
          verify-runner-image public
          test "$(uname -m)" = x86_64
          cargo check -p mesh-llm-config
