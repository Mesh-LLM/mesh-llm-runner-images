name: Publish GHCR

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: Image tag to publish
        required: true
        default: v3

jobs:
  publish:
    runs-on: ubuntu-latest
    concurrency:
      group: publish-ghcr-${{ github.ref }}
      cancel-in-progress: false
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/mesh-llm/mesh-llm-cuda-runner:${{ inputs.image_tag }}
            ghcr.io/mesh-llm/mesh-llm-cuda-runner:latest

      - name: Summarize published image
        run: |
          {
            echo '## Published image'
            echo
            echo '- `ghcr.io/mesh-llm/mesh-llm-cuda-runner:${{ inputs.image_tag }}`'
            echo '- `ghcr.io/mesh-llm/mesh-llm-cuda-runner:latest`'
          } >> "$GITHUB_STEP_SUMMARY"
